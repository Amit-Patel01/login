<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/boxicons@latest/css/boxicons.min.css" />

  <script>
    function validatePasswords() {
      var password = document.getElementById("password").value;
      var confirmPassword = document.getElementById("confirmPassword").value;
      var passwordRegex = /^(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{6,}$/;

      if (!passwordRegex.test(password)) {
        alert("Password must contain:\n- At least 1 uppercase letter\n- At least 1 number\n- At least 1 special character (@$!%*?&)\n- Minimum 6 characters");
        return false;
      }
      if (password !== confirmPassword) {
        alert("Password and Confirm Password must match!");
        return false;
      }
      return true;
    }

    function toggleAllPasswords() {
      const password = document.getElementById("password");
      const confirmPassword = document.getElementById("confirmPassword");
      const type = password.type === "password" ? "text" : "password";
      password.type = type;
      confirmPassword.type = type;
    }
  </script>
</head>
<body>
  <div class="wrapper">
    <form action="Databaseservlet" method="post" onsubmit="return validatePasswords()">
      <h1>Register</h1>

      <div class="input-box">
        <input type="text" name="fullname" placeholder="Full Name" required />
        <i class="bx bx-user"></i>
      </div>

      <div class="input-box">
        <input type="text" name="username" placeholder="Username" required />
        <i class="bx bx-id-card"></i>
      </div>

      <div class="input-box">
        <input type="tel" pattern="[0-9]{10}" name="mobile" placeholder="Mobile Number" required />
        <i class="bx bx-phone"></i>
      </div>

      <div class="input-box">
        <input type="email" name="email" placeholder="Email ID" required />
        <i class="bx bx-envelope"></i>
      </div>

      <div class="input-box">
        <input type="password" id="password" name="password" placeholder="Password" required />
        <i class="bx bx-lock"></i>
      </div>

      <div class="input-box">
        <input type="password" id="confirmPassword" placeholder="Confirm Password" required />
        <i class="bx bx-lock"></i>
      </div>

      <div class="show-password">
        <input type="checkbox" onclick="toggleAllPasswords()"> Show Password
      </div>

      <div class="remember-forgot">
        <label><input type="checkbox" required /> I agree to the terms</label>
      </div>

      <button type="submit">Register</button>

      <div class="register-link">
      </div>
    </form>
  </div>
</body>
</html>
